<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8503a"/>
      <stop offset="100%" stop-color="#f0c060"/>
    </linearGradient>
    <linearGradient id="markGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b54"/>
      <stop offset="50%" stop-color="#e8503a"/>
      <stop offset="100%" stop-color="#d4a044"/>
    </linearGradient>
  </defs>

  <!-- Mark: Catalyst symbol — an angular spark/turning-point shape -->
  <!-- Three converging angular strokes that form a dynamic catalyst mark -->
  <g transform="translate(10, 6)">
    <!-- Main upward thrust — the catalyst moment -->
    <path d="M 30 62 L 34 28 L 38 8 L 42 28 L 46 62"
          fill="none" stroke="url(#markGlow)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Left diagonal — acceleration line -->
    <path d="M 12 56 L 28 34 L 38 16"
          fill="none" stroke="#e8503a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right diagonal — acceleration line -->
    <path d="M 64 56 L 48 34 L 38 16"
          fill="none" stroke="#e8503a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Spark dot at apex -->
    <circle cx="38" cy="8" r="4" fill="url(#sparkGrad)"/>
    <!-- Small energy dots -->
    <circle cx="22" cy="44" r="2" fill="#d4a044" opacity="0.7"/>
    <circle cx="54" cy="44" r="2" fill="#d4a044" opacity="0.7"/>
    <!-- Horizontal base line — the ground/before state -->
    <line x1="14" y1="62" x2="62" y2="62" stroke="#a0a3b1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Wordmark: "Catalyst AI" -->
  <text x="95" y="42" font-family="'Bricolage Grotesque', 'Segoe UI', Arial, sans-serif"
        font-weight="700" font-size="32" fill="#f0f0f2" letter-spacing="-0.5">
    Catalyst
  </text>
  <text x="270" y="42" font-family="'Bricolage Grotesque', 'Segoe UI', Arial, sans-serif"
        font-weight="700" font-size="32" fill="#e8503a" letter-spacing="-0.5">
    AI
  </text>

  <!-- Tagline -->
  <text x="95" y="62" font-family="'Urbanist', 'Segoe UI', Arial, sans-serif"
        font-weight="400" font-size="11" fill="#a0a3b1" letter-spacing="3">
    ADVISORY
  </text>
</svg>