<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" width="380" height="80">
  <defs>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8503a"/>
      <stop offset="100%" stop-color="#d4a044"/>
    </linearGradient>
    <clipPath id="aClip">
      <text x="0" y="52" font-family="'Bricolage Grotesque', 'Segoe UI', Arial, sans-serif"
            font-weight="800" font-size="46" letter-spacing="-1.5">CATALYST</text>
    </clipPath>
  </defs>

  <!-- Main wordmark: CATALYST in bold caps -->
  <text x="0" y="52" font-family="'Bricolage Grotesque', 'Segoe UI', Arial, sans-serif"
        font-weight="800" font-size="46" fill="#f0f0f2" letter-spacing="-1.5">
    CATALYST
  </text>

  <!-- Geometric accent: a diagonal slash through the A's crossbar,
       representing the "catalyst turning point" — sits inside the first A -->
  <!-- The first A starts roughly at x=42. We place a sharp diagonal vermillion line
       through it to give the A a distinctive treatment -->
  <line x1="55" y1="52" x2="78" y2="14"
        stroke="url(#accentGrad2)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Small diamond/spark at the top of the slash -->
  <polygon points="78,10 81,14 78,18 75,14" fill="#e8503a"/>

  <!-- "AI" portion — separated with a slight gap and colored in accent -->
  <text x="295" y="52" font-family="'Bricolage Grotesque', 'Segoe UI', Arial, sans-serif"
        font-weight="800" font-size="46" fill="#e8503a" letter-spacing="-1.5">
    AI
  </text>

  <!-- Subtle separator dot between CATALYST and AI -->
  <circle cx="286" cy="42" r="3" fill="#d4a044"/>

  <!-- Advisory tagline -->
  <text x="1" y="72" font-family="'Urbanist', 'Segoe UI', Arial, sans-serif"
        font-weight="500" font-size="11" fill="#a0a3b1" letter-spacing="5.5">
    A D V I S O R Y
  </text>
</svg>